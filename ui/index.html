<!DOCTYPE html>
<html>
<head>
  <title>GeckTrack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="display: flex; justify-content: space-between;">
    <div class="nav-tabs" style="margin-bottom: 0; border: none;">
      <button id="tab-search" class="nav-btn active">Search</button>
      <button id="tab-library" class="nav-btn">Library</button>
    </div>

    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
      <img src="assets/gifs/logo.gif" alt="GeckTrack Logo" class="pixel-art" style="height: 30px; width: auto;">
      <p>geckTrack</p>
      <p style="margin-left: 20px; margin-right: 20px">|</p>
      <button id="btn-theme-toggle" style="padding: 6px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;margin-left: 24px">
        <img id="theme-icon" src="assets/icons/theme-dark.png" class="pixel-art" style="width: 24px; height: 24px;">
      </button>
    </div>
  </div>
  <div style="border-bottom: 3px solid var(--border-color); margin-bottom: 20px;"></div>

  <div id="screen-search" class="screen active">
    <div class="search-row">
      <button id="btn-back" disabled title="Go Back">&lt;</button>
      <button id="btn-forward" disabled title="Go Forward">&gt;</button>
      <input type="text" id="search-input" placeholder="Search a track...">
      <button id="btn-yt" class="btn-youtube">YouTube</button>
      <button id="btn-deezer" class="btn-spotify">Spotify</button> </div>

    <div id="ai-suggestions" style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;"></div>

    <div id="search-state-container" style="text-align: center; margin-top: 40px;">
      <img id="search-state-gif" src="assets/gifs/sleep.gif" class="pixel-art" style="width: 256px">
      <div id="search-state-text" style="font-size: 24px; color: var(--text-color); margin-top: 20px;">Awaiting your command...</div>
    </div>

    <div id="search-results" class="fluffy-panel" style="display: none;"></div>
  </div>

  <div id="screen-library" class="screen">
    <div style="display: flex; gap: 20px; height: 100%; overflow: hidden;">

      <div class="fluffy-panel" style="width: 250px; flex-shrink: 0; display: flex; flex-direction: column; padding: 15px;">
        <h3 style="margin-top: 0; text-align: center;">Playlists</h3>
        <button id="btn-new-playlist" style="margin-bottom: 15px; width: 100%; padding: 6px;">+ New</button>

        <div id="playlist-list" style="display: flex; flex-direction: column; gap: 10px; overflow-y: auto; overflow-x: hidden; padding-right: 5px;">
          <button class="playlist-btn active" id="btn-all-music">🎵 All Music</button>
        </div>
      </div>

      <div class="fluffy-panel" style="flex-grow: 1; display: flex; flex-direction: column; min-width: 0;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 15px;">
            <h2 id="library-view-title" style="margin: 0; white-space: nowrap;">All Music</h2>

            <input type="text" id="library-search-input" placeholder="Search your library..." style="min-width: 0;">

            <div style="display: flex; gap: 10px;">
              <button id="btn-toggle-select" style="white-space: nowrap;">☑️ Select</button>
              <button id="btn-refresh" style="white-space: nowrap;">🔄</button>
            </div>
          </div>

          <div id="bulk-bar" style="display: none; padding: 10px 20px; align-items: center; gap: 15px; border-radius: 12px; margin-bottom: 10px; font-weight: bold; position: sticky; top: 0; z-index: 50;">
            <span id="bulk-count">0 songs selected</span>
            <div style="flex-grow: 1;"></div>
            <button id="btn-bulk-add">➕ Add to Playlist</button>
            <button id="btn-bulk-remove" style="display: none;">➖ Remove</button>
            <button id="btn-bulk-delete">🗑️ Delete</button>
            </div>

          <div id="library-results" style="overflow-y: auto; flex-grow: 1; padding-bottom: 150px; overflow-x: hidden;"></div>
      </div>
    </div>
  </div>

  <div id="audio-player-container" class="fluffy-panel" style="display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-top: 10px; padding: 15px; border-radius: 16px;">

    <audio id="audio-player" src=""></audio>

    <div style="display: flex; gap: 10px; align-items: center; min-width: 150px;">
      <button id="prev-btn" title="Previous" style="padding: 6px 12px;">⏮</button>
      <button id="play-pause-btn" style="padding: 6px 16px;">▶ Play</button>
      <button id="next-btn" title="Next" style="padding: 6px 12px;">⏭</button>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; flex-grow: 1; min-width: 0; padding: 0 20px; gap: 5px;">
<div id="track-title" style="font-size: 18px; font-weight: bold; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Waiting for a track...</div>
      <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
        <span id="current-time" style="font-size: 14px; min-width: 45px; text-align: right;">0:00</span>
        <input type="range" id="progress-bar" value="0" min="0" max="100" style="flex-grow: 1; margin: 0; --progress-pct: 0%;">
        <span id="total-time" style="font-size: 14px; min-width: 45px;">0:00</span>
      </div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center; justify-content: flex-end; flex-shrink: 0; min-width: 150px;">

      <button id="shuffle-btn" title="Shuffle" style="width: 40px; height: 40px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 18px;">🔀</button>
      <button id="btn-magic-suggest" title="AI Auto-DJ" style="width: 40px; height: 40px; padding: 0; display: flex; justify-content: center; align-items: center; font-size: 18px;">✨</button>

      <div id="player-menu-container" style="display: none; position: relative;">
        <button id="btn-player-menu" class="song-menu-btn" style="font-size: 24px; padding: 0 5px;">⋮</button>
        <div id="player-dropdown" class="dropdown-menu" style="bottom: 100%; top: auto; margin-bottom: 10px; right: 0;">
          <button id="player-opt-rename" class="dropdown-item">✏️ Edit Info</button>
          <button id="player-opt-add" class="dropdown-item">➕ Add to Playlist</button>
          <button id="player-opt-trim" class="dropdown-item">✂️ Trim Audio</button>
          <button id="player-opt-del" class="dropdown-item" style="color: var(--danger-color);">🗑️ Delete Song</button>
        </div>
      </div>
    </div>

  </div>

  <div id="trim-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content">
      <h3 style="margin: 0; text-align: center;">✂️ Trim Audio</h3>
      <p id="trim-track-name" style="text-align: center;">Song Name</p>
      <audio id="trim-audio-player" style="display: none;"></audio>
      <button id="btn-preview-trim" style="align-self: center;">▶ Play Selection</button>

      <div style="display: flex; flex-direction: column; gap: 15px;">
        <label style="display: flex; align-items: center; gap: 10px;">
          <span style="min-width: 60px;">Start:</span>
          <input type="range" id="trim-start" min="0" max="100" value="0" step="0.1" style="margin: 0; flex-grow: 1;">
          <span id="trim-start-display" style="width: 45px; text-align: right;">0.0s</span>
        </label>

        <label style="display: flex; align-items: center; gap: 10px;">
          <span style="min-width: 60px;">End:</span>
          <input type="range" id="trim-end" min="0" max="100" value="30" step="0.1" style="margin: 0; flex-grow: 1;">
          <span id="trim-end-display" style="width: 45px; text-align: right;">30.0s</span>
        </label>
      </div>

      <p id="trim-status" style="height: 15px; text-align: center; margin: 0;"></p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-trim" style="background: transparent;">Cancel</button>
        <button id="btn-confirm-trim">✂️ Cut & Save</button>
      </div>
    </div>
  </div>

  <div id="playlist-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content">
      <h3 style="margin: 0; text-align: center;">Add to Playlist</h3>
      <p id="playlist-track-name" style="text-align: center;">Song Name</p>
      <select id="playlist-select"></select>
      <p id="playlist-status" style="height: 15px; text-align: center; margin:0;"></p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-playlist" style="background: transparent;">Cancel</button>
        <button id="btn-confirm-playlist">Add Song</button>
      </div>
    </div>
  </div>

  <div id="create-playlist-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content">
      <h3 style="margin: 0; text-align: center;">Create New Playlist</h3>
      <input type="text" id="new-playlist-input" placeholder="e.g., Gaming Vibes">
      <div>
        <label style="display: block; margin-bottom: 5px;">Choose an Icon:</label>
        <div id="create-icon-gallery" style="display: flex; gap: 10px; flex-wrap: wrap; max-height: 120px; overflow-y: auto; background: var(--panel-bg); padding: 10px; border-radius: 12px; border: 3px solid var(--border-color); box-shadow: inset 0 3px 0 var(--shadow-color);"></div>
      </div>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-create" style="background: transparent;">Cancel</button>
        <button id="btn-confirm-create">Create</button>
      </div>
    </div>
  </div>

  <div id="edit-playlist-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content">
      <h3 style="margin: 0; text-align: center;">✏️ Edit Playlist</h3>
      <input type="text" id="edit-playlist-input" placeholder="Playlist Name">
      <div>
        <label style="display: block; margin-bottom: 5px;">Change Icon:</label>
        <div id="edit-icon-gallery" style="display: flex; gap: 10px; flex-wrap: wrap; max-height: 120px; overflow-y: auto; background: var(--panel-bg); padding: 10px; border-radius: 12px; border: 3px solid var(--border-color); box-shadow: inset 0 3px 0 var(--shadow-color);"></div>
      </div>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-edit-playlist" style="background: transparent;">Cancel</button>
        <button id="btn-confirm-edit-playlist">Save</button>
      </div>
      <div style="border-top: 3px dashed var(--border-color); margin: 5px 0;"></div>
      <button id="btn-delete-playlist" style="background: var(--danger-color); color: white;">🗑️ Delete Playlist</button>
    </div>
  </div>

  <div id="rename-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content">
      <h3 style="margin: 0; text-align: center;">✏️ Edit Track Info</h3>
      <input type="text" id="rename-artist-input" placeholder="Artist Name">
      <input type="text" id="rename-title-input" placeholder="Track Title">
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-rename" style="background: transparent;">Cancel</button>
        <button id="btn-confirm-rename">Save Info</button>
      </div>
    </div>
  </div>
  <div id="confirm-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 99999; justify-content: center; align-items: center;">
    <div class="fluffy-modal-content" style="text-align: center;">
      <h3 id="confirm-title" style="margin: 0; color: var(--danger-color);">⚠️ Are you sure?</h3>
      <p id="confirm-message" style="margin-bottom: 20px;">Do you really want to delete this?</p>

      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="btn-cancel-confirm" style="background: transparent;">Cancel</button>
        <button id="btn-ok-confirm" style="background: var(--danger-color); color: white;">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>

  <script>
    const themeBtn = document.getElementById('btn-theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    themeBtn.onclick = () => {
      document.body.classList.toggle('dark-theme');
      if(document.body.classList.contains('dark-theme')) {
        themeIcon.src = 'assets/icons/theme-light.png'; // Show Sun when in Dark Mode
      } else {
        themeIcon.src = 'assets/icons/theme-dark.png'; // Show Moon when in Light Mode
      }
    };
  </script>
</body>
</html>
